<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>QR Per Boba — stampa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --ink:#08060e;
      --cream:#f5ede8;
      --gold:#c9a84c;
      --blush:#e8a0b0;
      --muted:#9a8a90;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#1a1520;
      color:var(--cream);
      font-family:'Raleway',sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:32px 16px 48px;
      gap:20px;
    }
    .toolbar{
      display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
      print-color-adjust:exact;
    }
    .toolbar button{
      border:1px solid rgba(201,168,76,.45);
      background:transparent;
      color:var(--gold);
      font-family:'Raleway',sans-serif;
      font-size:.7rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      padding:12px 22px;
      cursor:pointer;
    }
    .toolbar button:hover{background:rgba(201,168,76,.1)}
    .hint{color:var(--muted);font-size:.85rem;text-align:center;max-width:420px;line-height:1.5}
    .card{
      width:min(100%, 420px);
      aspect-ratio:1240 / 1748;
      background:var(--ink);
      border:1px solid rgba(201,168,76,.55);
      padding:28px 24px 32px;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      position:relative;
    }
    .card::before{
      content:'';
      position:absolute;inset:10px;
      border:1px solid rgba(201,168,76,.2);
      pointer-events:none;
    }
    .eyebrow{
      font-size:.58rem;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--gold);
      margin-top:8px;
    }
    h1{
      font-family:'Cormorant Garamond',serif;
      font-weight:300;
      font-size:clamp(2.4rem,10vw,3.2rem);
      line-height:1.05;
      margin-top:14px;
    }
    h1 em{font-style:italic;color:var(--blush)}
    .sub{
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      color:var(--muted);
      margin-top:10px;
      font-size:1.05rem;
    }
    .qr-wrap{
      margin:22px 0 18px;
      background:var(--cream);
      padding:18px;
      border-radius:18px;
      line-height:0;
    }
    .qr-wrap img{
      width:min(68vw, 260px);
      height:auto;
      display:block;
    }
    .cta{
      font-size:.58rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--gold);
    }
    .cta-sub{
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-size:1.15rem;
      margin-top:8px;
    }
    .sig{
      margin-top:18px;
      color:var(--muted);
      font-size:.8rem;
      letter-spacing:.04em;
    }
    .url{
      margin-top:auto;
      padding-top:16px;
      font-size:.62rem;
      color:#64585c;
      word-break:break-all;
    }

    @media print{
      @page{size:A5;margin:10mm}
      body{background:#fff;padding:0;gap:0}
      .toolbar,.hint{display:none!important}
      .card{
        width:100%;
        max-width:none;
        aspect-ratio:auto;
        min-height:100vh;
        box-shadow:none;
        border-width:1.5px;
        justify-content:center;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" onclick="window.print()">Stampa / Salva PDF</button>
  </div>
  <p class="hint">Apri questa pagina, premi <strong>Stampa</strong> e scegli “Salva come PDF” oppure stampa su carta. Il QR apre il sito Per Boba.</p>

  <article class="card" aria-label="Biglietto QR per Boba">
    <p class="eyebrow">Nove mesi insieme</p>
    <h1>Per<br/><em>Boba</em></h1>
    <p class="sub">con tutto il mio cuore</p>
    <div class="qr-wrap">
      <img src="qr-per-boba-semplice.png" alt="QR code verso il sito Per Boba" width="260" height="260"/>
    </div>
    <p class="cta">Inquadra e apri</p>
    <p class="cta-sub">il regalo che ho fatto per te</p>
    <p class="sig">— per sempre tuo Gabry ♥</p>
    <p class="url">onlyg4bb0.github.io/per-boba</p>
  </article>
</body>
</html>
